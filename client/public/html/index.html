<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1" />

  <title>Payments API Sample</title>

  <link rel="stylesheet"
    href="https://unpkg.com/mvp.css" />
  <link rel="stylesheet"
    href="/css/styles.css" />
  <script src="https://pay.blackbaud.com/scripts/checkout"></script>
  <script src="/index.js"
    defer></script>
</head>

<body>
  <main>
    <main class="container">
      <div>
        <h3>Current configuration</h3>
        <div>
          <label>Payment Configuration Id</label>
          <div><code id="payment-config-id"></code></div>
        </div>
      </div>
      </div>
      <div>
        <h3>Transaction details</h3>
        <div></div>
        <div>
          <label for="amount">Amount</label>
          <input id="amount"
            spellcheck="false"
            type="number"
            value="27.50"
            step="0.01" />
        </div>
      </div>

      <button type="button"
        class="btn btn-primary"
        id="donate">Donate now</button>

      <div>
        <h3>Results</h3>
        <div class="content-block">
          <div class="container-row">
            <div>Transaction id: <code id="transaction-id"></code></div>
          </div>
          <div class="container-row">
            <div>Authorized amount: <code id="authorized-amount"></code></div>
          </div>
        </div>
      </div>
    </main>
</body>

</html>
